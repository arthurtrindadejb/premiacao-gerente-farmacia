{% extends "base.html" %}
{% block titulo %}Entrar — Premiação Variável{% endblock %}
{% block body_classe %}estreito{% endblock %}
{% block conteudo %}
<div class="card">
  <h2>Entrar</h2>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="field">
      <label>Usuário</label>
      <input type="text" name="login" required autofocus>
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" name="senha" required>
    </div>
    <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center;">Entrar</button>
  </form>
</div>
{% endblock %}
